_schema-version: "3.2"
ID: apsmanagement
version: 0.0.1
modules:
- name: apsmanagement-destination-content
  type: com.sap.application.content
  requires:
  - name: apsmanagement-destination-service
    parameters:
      content-target: true
  - name: apsmanagement_html_repo_host
    parameters:
      service-key:
        name: apsmanagement_html_repo_host-key
  - name: uaa_apsmanagement
    parameters:
      service-key:
        name: uaa_apsmanagement-key
  parameters:
    content:
      subaccount:
        destinations:
        - Name: apsmanagement_apsmanagement_html_repo_host
          ServiceInstanceName: apsmanagement-html5-app-host-service
          ServiceKeyName: apsmanagement_html_repo_host-key
          sap.cloud.service: apsmanagement
        - Authentication: OAuth2UserTokenExchange
          Name: apsmanagement_uaa_apsmanagement
          ServiceInstanceName: apsmanagement-xsuaa-service
          ServiceKeyName: uaa_apsmanagement-key
          sap.cloud.service: apsmanagement
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: apsmanagement-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: apsmanagement_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - apmgtnspworkflowuimodule.zip
      name: apmgtnspworkflowuimodule
      target-path: resources/
- name: apmgtnspworkflowuimodule
  type: html5
  path: workflow-ui-module
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: apsmanagement-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        subaccount:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: apsmanagement-destination-service
    service-plan: lite
- name: apsmanagement_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: apsmanagement-html5-app-host-service
    service-plan: app-host
- name: uaa_apsmanagement
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: apsmanagement-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
